version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: logistica_db
    restart: always
    environment:
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica123
      POSTGRES_DB: logistica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: logistica_cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
